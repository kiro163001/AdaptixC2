name: Build AdaptixC2

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.4'
  QT_VERSION: '6.7.0'

jobs:
  # ============================================
  # Server + Extenders (Linux only)
  # ============================================
  build-server:
    name: Server & Extenders (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git mingw-w64 make gcc g++ g++-mingw-w64 \
            build-essential libssl-dev zlib1g-dev

      - name: Setup Go ${{ env.GO_VERSION }}
        run: |
          wget -q https://go.dev/dl/go${{ env.GO_VERSION }}.linux-amd64.tar.gz -O /tmp/go.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Setup go-win7
        run: |
          git clone https://github.com/Adaptix-Framework/go-win7 /tmp/go-win7
          sudo mv /tmp/go-win7 /usr/lib/
          sudo mkdir -p /usr/lib/go-win7/pkg/include
          cd /usr/lib/go-win7/src/runtime
          for f in *.h; do sudo ln -sf /usr/lib/go-win7/src/runtime/$f /usr/lib/go-win7/pkg/include/$f; done

      - name: Build Server
        run: make server

      - name: Build Extenders
        run: make extenders

      - name: Upload Server
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: |
            dist/adaptixserver
            dist/profile.yaml
            dist/404page.html
            dist/ssl_gen.sh
          retention-days: 30

      - name: Upload Extenders
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-extenders
          path: dist/extenders/
          retention-days: 30

  # ============================================
  # Client - Linux
  # ============================================
  build-client-linux:
    name: Client (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ build-essential make cmake \
            mingw-w64 g++-mingw-w64 libssl-dev \
            qt6-base-dev qt6-base-private-dev \
            qt6-websockets-dev qt6-declarative-dev \
            libxkbcommon-dev libgl1-mesa-dev libxcb-xinerama0

      - name: Build Client
        run: make client-fast

      - name: Upload Client
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-linux
          path: dist/AdaptixClient
          retention-days: 30

  # ============================================
  # Client - macOS
  # ============================================
  build-client-macos:
    name: Client (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: brew install cmake openssl qt@6

      - name: Build Client
        run: |
          export PATH="$(brew --prefix qt@6)/bin:$PATH"
          cd AdaptixClient
          cmake . -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)
          make -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p dist
          mv AdaptixClient/AdaptixClient dist/
          $(brew --prefix qt@6)/bin/macdeployqt dist/AdaptixClient || true

      - name: Upload Client
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-macos
          path: dist/AdaptixClient
          retention-days: 30

  # ============================================
  # Client - Windows
  # ============================================
  build-client-windows:
    name: Client (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebsockets

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Client
        shell: cmd
        run: |
          cd AdaptixClient
          cmake . -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release
          nmake

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          mkdir dist
          copy AdaptixClient\AdaptixClient.exe dist\
          cd dist
          windeployqt.exe --release --no-translations AdaptixClient.exe

      - name: Upload Client
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-windows
          path: dist/
          retention-days: 30

  # ============================================
  # Release (tag push only)
  # ============================================
  package-release:
    name: Package Release
    needs: [build-server, build-client-linux, build-client-macos, build-client-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          cd artifacts

          # Server + Extenders
          mkdir -p server-bundle
          cp -r adaptix-server-linux/* server-bundle/
          cp -r adaptix-extenders/* server-bundle/extenders/ 2>/dev/null || mkdir -p server-bundle/extenders && cp -r adaptix-extenders/* server-bundle/extenders/
          chmod +x server-bundle/adaptixserver server-bundle/ssl_gen.sh
          tar -czvf adaptix-server-linux-amd64.tar.gz -C server-bundle .

          # Linux Client
          chmod +x adaptix-client-linux/AdaptixClient
          tar -czvf adaptix-client-linux-amd64.tar.gz -C adaptix-client-linux .

          # macOS Client
          chmod +x adaptix-client-macos/AdaptixClient 2>/dev/null || true
          tar -czvf adaptix-client-macos.tar.gz -C adaptix-client-macos .

          # Windows Client
          zip -r adaptix-client-windows.zip adaptix-client-windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/adaptix-server-linux-amd64.tar.gz
            artifacts/adaptix-client-linux-amd64.tar.gz
            artifacts/adaptix-client-macos.tar.gz
            artifacts/adaptix-client-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Docker Image (main/master push or tag)
  # ============================================
  build-docker:
    name: Docker Image
    needs: [build-server]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Download Server artifacts
        uses: actions/download-artifact@v4
        with:
          name: adaptix-server-linux
          path: AdaptixServer/server-dist/

      - name: Download Extenders artifacts
        uses: actions/download-artifact@v4
        with:
          name: adaptix-extenders
          path: AdaptixServer/server-dist/extenders/

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
