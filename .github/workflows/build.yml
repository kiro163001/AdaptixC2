name: Build AdaptixC2

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.4'

jobs:
  build-server:
    name: Server & Extenders (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git mingw-w64 make gcc g++ g++-mingw-w64 \
            build-essential libssl-dev zlib1g-dev

      - name: Setup Go ${{ env.GO_VERSION }}
        run: |
          wget -q https://go.dev/dl/go${{ env.GO_VERSION }}.linux-amd64.tar.gz -O /tmp/go.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Setup go-win7
        run: |
          git clone https://github.com/Adaptix-Framework/go-win7 /tmp/go-win7
          sudo mv /tmp/go-win7 /usr/lib/
          sudo mkdir -p /usr/lib/go-win7/pkg/include
          cd /usr/lib/go-win7/src/runtime
          for f in *.h; do sudo ln -sf /usr/lib/go-win7/src/runtime/$f /usr/lib/go-win7/pkg/include/$f; done

      - name: Build Server (static)
        run: CGO_ENABLED=0 make server

      - name: Build Extenders (static)
        run: CGO_ENABLED=0 make extenders

      - name: Upload Server (with Extenders)
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: |
            dist/adaptixserver
            dist/profile.yaml
            dist/404page.html
            dist/ssl_gen.sh
            dist/extenders/
          retention-days: 30

  package-release:
    name: Package Release
    needs: [build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          cd artifacts/adaptix-server-linux
          chmod +x adaptixserver ssl_gen.sh
          tar -czvf ../adaptix-server-linux-amd64.tar.gz .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/adaptix-server-linux-amd64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
