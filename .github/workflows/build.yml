name: Build AdaptixC2

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.4'

jobs:
  # ============================================
  # Server + Extenders (Linux only)
  # ============================================
  build-server:
    name: Server & Extenders (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git mingw-w64 make gcc g++ g++-mingw-w64 \
            build-essential libssl-dev zlib1g-dev

      - name: Setup Go ${{ env.GO_VERSION }}
        run: |
          wget -q https://go.dev/dl/go${{ env.GO_VERSION }}.linux-amd64.tar.gz -O /tmp/go.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Setup go-win7
        run: |
          git clone https://github.com/Adaptix-Framework/go-win7 /tmp/go-win7
          sudo mv /tmp/go-win7 /usr/lib/
          sudo mkdir -p /usr/lib/go-win7/pkg/include
          cd /usr/lib/go-win7/src/runtime
          for f in *.h; do sudo ln -sf /usr/lib/go-win7/src/runtime/$f /usr/lib/go-win7/pkg/include/$f; done

      - name: Build Server
        run: make server

      - name: Build Extenders
        run: make extenders

      - name: Upload Server (with Extenders)
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: |
            dist/adaptixserver
            dist/profile.yaml
            dist/404page.html
            dist/ssl_gen.sh
            dist/extenders/
          retention-days: 30

  # ============================================
  # Client - Linux (AppImage via Docker)
  # ============================================
  build-client-linux:
    name: Client (Linux AppImage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Client via Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: build-client
          load: true
          tags: adaptix-client-builder:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Extract AppImage
        run: |
          mkdir -p dist
          docker create --name client-extract adaptix-client-builder:latest
          docker cp client-extract:/client-dist/AdaptixClient-x86_64.AppImage dist/
          docker rm client-extract

      - name: Upload Client
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-linux
          path: dist/AdaptixClient-x86_64.AppImage
          retention-days: 30

  # ============================================
  # Client - macOS (.app bundle + DMG)
  # ============================================
  build-client-macos:
    name: Client (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 via aqtinstall
        run: |
          pip3 install aqtinstall --break-system-packages
          aqt install-qt mac desktop 6.9.2 clang_64 \
            -m qtwebsockets qtnetworkauth \
            -O $HOME/Qt
          echo "$HOME/Qt/6.9.2/macos/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: brew install cmake openssl@3

      - name: Build Client
        run: |
          export QT_DIR="$HOME/Qt/6.9.2/macos"
          export CMAKE_PREFIX_PATH="$QT_DIR"
          cd AdaptixClient
          cmake . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_DIR"
          make -j$(sysctl -n hw.ncpu)

      - name: Create .app bundle and embed Qt libs
        run: |
          export QT_DIR="$HOME/Qt/6.9.2/macos"
          APP_DIR="dist/AdaptixClient.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"

          cp AdaptixClient/AdaptixClient "$APP_DIR/MacOS/AdaptixClient"

          cat > "$APP_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>AdaptixClient</string>
            <key>CFBundleIdentifier</key>
            <string>com.adaptix.client</string>
            <key>CFBundleName</key>
            <string>AdaptixClient</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          "$QT_DIR/bin/macdeployqt" dist/AdaptixClient.app -always-overwrite

          # macdeployqt invalidates code signatures, re-sign everything
          find dist/AdaptixClient.app -type f \( -name "*.dylib" -o -name "*.framework" -o -name "*.so" \) -exec codesign --force --sign - {} \;
          find dist/AdaptixClient.app/Contents/Frameworks -type d -name "*.framework" -exec codesign --force --sign - {} \;
          codesign --force --deep --sign - dist/AdaptixClient.app

      - name: Create DMG
        run: |
          hdiutil create -volname "AdaptixClient" \
            -srcfolder dist/AdaptixClient.app \
            -ov -format UDZO \
            dist/AdaptixClient.dmg

      - name: Upload Client
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-macos
          path: dist/AdaptixClient.dmg
          retention-days: 30

  # ============================================
  # Client - Windows (MSYS2 MinGW)
  # ============================================
  build-client-windows:
    name: Client (Windows)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-openssl

      - name: Build Client
        run: |
          cd AdaptixClient
          cmake -S . -B cmake-build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build cmake-build-release --config Release

      - name: Deploy Client
        run: |
          mkdir -p dist
          cp AdaptixClient/cmake-build-release/AdaptixClient.exe dist/
          cd dist
          windeployqt.exe AdaptixClient.exe
          # Copy MinGW runtime DLLs (matching official build.bat)
          for dll in \
            libwinpthread-1.dll \
            libgcc_s_seh-1.dll \
            libstdc++-6.dll \
            libfreetype-6.dll \
            libharfbuzz-0.dll \
            libmd4c.dll \
            libpng16-16.dll \
            zlib1.dll \
            libb2-1.dll \
            libdouble-conversion.dll \
            libicuin*.dll \
            libicuuc*.dll \
            libpcre2-16-0.dll \
            libbrotlidec.dll \
            libzstd.dll \
            libbz2-1.dll \
            libglib-2.0-0.dll \
            libgraphite2.dll \
            libbrotlicommon.dll \
            libicudt*.dll \
            libpcre2-8-0.dll \
            libintl-8.dll \
            libiconv-2.dll; do
            cp -n /mingw64/bin/$dll . 2>/dev/null || true
          done

      - name: Upload Client
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-windows
          path: dist/
          retention-days: 30

  # ============================================
  # Release (tag push only)
  # ============================================
  package-release:
    name: Package Release
    needs: [build-server, build-client-linux, build-client-macos, build-client-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          cd artifacts

          # Server + Extenders (already bundled together)
          cd adaptix-server-linux
          chmod +x adaptixserver ssl_gen.sh
          tar -czvf ../adaptix-server-linux-amd64.tar.gz .
          cd ..

          # Linux Client
          chmod +x adaptix-client-linux/AdaptixClient-x86_64.AppImage
          cp adaptix-client-linux/AdaptixClient-x86_64.AppImage adaptix-client-linux-x86_64.AppImage

          # macOS Client
          cp adaptix-client-macos/AdaptixClient.dmg adaptix-client-macos.dmg

          # Windows Client
          cd adaptix-client-windows && zip -r ../adaptix-client-windows.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/adaptix-server-linux-amd64.tar.gz
            artifacts/adaptix-client-linux-x86_64.AppImage
            artifacts/adaptix-client-macos.dmg
            artifacts/adaptix-client-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Docker Image (main/master push or tag)
  # ============================================
  build-docker:
    name: Docker Image
    needs: [build-server]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Download Server artifacts
        uses: actions/download-artifact@v4
        with:
          name: adaptix-server-linux
          path: AdaptixServer/server-dist/

      - name: Verify artifacts
        run: |
          echo "=== Server dist contents ==="
          ls -laR AdaptixServer/server-dist/

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
